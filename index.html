<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; text-align:center; }
    h2 { color:#1a56a0; }

    .controls { margin-bottom:15px; }

    select, button {
      padding:8px 12px;
      font-size:14px;
      margin:5px;
    }

    button {
      background:#1a56a0;
      color:#fff;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    table {
      margin:auto;
      border-collapse:collapse;
      background:#fff;
      width:95%;
    }

    th,td {
      border:1px solid #999;
      padding:6px;
      text-align:center;
    }

    th { background:#1a56a0; color:#fff; }

    .red { background:#ff4d4d; color:#fff; }
    .yellow { background:#ffd633; }
    .green { background:#00b050; color:#fff; }
  </style>
</head>

<body>

<h2>RPM Dashboard</h2>

<div class="controls">
  <select id="view">
    <option value="overall">Overall</option>
    <option value="cv">Consumer Voice</option>
    <option value="epu">EPU</option>
    <option value="terminal">Terminal</option>
    <option value="home">AT-Home</option>
    <option value="adsl">ADSL</option>
  </select>

  <button onclick="renderTable()">Show</button>
</div>

<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";

let data = [];

const views = {
  cv: range(0,11),          // A:L
  epu: [0, ...range(12,21)],// A + M:V
  terminal: [0, ...range(22,26)], // A + W:AA
  home: [0, ...range(27,31)],     // A + AB:AF
  adsl: [0, ...range(32,36)],     // A + AG:AK
  overall: [0,4,9,11,15,20,21,26,31,36,37,38]
};

function range(start,end){
  let arr=[];
  for(let i=start;i<=end;i++) arr.push(i);
  return arr;
}

function getClass(pct){
  if(pct < 90) return "red";
  if(pct < 100) return "yellow";
  return "green";
}

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  data = json.data;
}

function renderTable(){
  const view = document.getElementById("view").value;
  const colsIndex = views[view];

  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  if(!data.length) return;

  const headers = Object.keys(data[0]);

  let headerRow = "<tr>";
  colsIndex.forEach(i => {
    headerRow += `<th>${headers[i] || ""}</th>`;
  });
  headerRow += "</tr>";
  thead.innerHTML = headerRow;

  data.forEach(item => {
    let row = "<tr>";
    const values = Object.values(item);

    colsIndex.forEach(i => {
      let val = values[i] ?? "";

      if(headers[i] && headers[i].includes("%") && val !== ""){
        let pct = val * 100;
        row += `<td class="${getClass(pct)}">${Math.round(pct)}%</td>`;
      } else {
        row += `<td>${val}</td>`;
      }
    });

    row += "</tr>";
    tbody.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
