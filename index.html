<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
</head>
<body>

<h2>RPM Dashboard</h2>

<table border="1" id="table">
  <thead>
    <tr>
      <th>Store</th>
      <th>Target</th>
      <th>MTD</th>
      <th>%</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  const data = json.data;

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(item => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.store}</td>
      <td>${item.target}</td>
      <td>${item.mtd}</td>
      <td>${Math.round(item.mtd_pct * 100)}%</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
</script>

</body>
</html>
