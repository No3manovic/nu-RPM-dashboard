<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; text-align:center; }
    h2 { color:#1a56a0; }
    select, button { padding:8px 12px; margin:5px; }
    button {
      background:#1a56a0;
      color:#fff;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    table {
      margin:auto;
      border-collapse:collapse;
      width:95%;
      background:#fff;
    }
    th,td {
      border:1px solid #999;
      padding:6px;
      text-align:center;
    }
    th { background:#1a56a0; color:#fff; }
    .red { background:red; color:#fff; }
    .yellow { background:yellow; }
    .green { background:green; color:#fff; }
  </style>
</head>
<body>
<h2>RPM Dashboard</h2>
<select id="view">
  <option value="cv">Consumer Voice</option>
  <option value="epu">EPU</option>
  <option value="terminal">Terminal</option>
  <option value="home">AT-Home & Gated Community</option>
  <option value="adsl">ADSL GAs</option>
  <option value="overall">Overall</option>
</select>
<button onclick="renderTable()">Show</button>
<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";
let data = [];

const percentCols = [
  "CV Points MTD%","CV Points Projection",
  "CV GAs MTD%","CV GAs Projection",
  "EPU Points MTD%","EPU Points Projection",
  "EPU GAs MTD%","EPU GAs Projection",
  "Terminal MTD%","Terminal Projection",
  "AT-Home MTD%",
  "ADSL MTD%","ADSL Projection",
  "Consumer Box","EPU Box",
  "AT-Home & Gated Community Box",
  "Overall","Final Commission"
];

const views = {
  cv: {
    title: "Consumer voice",
    cols: [
      "Store",
      "CV Points target","CV Points MTD","CV Points MTD%","CV Points Projection","CV Points daily required",
      "CV GAs target","CV GAs MTD","CV GAs MTD%","CV GAs Projection","CV GAs daily required",
      "Consumer Box"
    ]
  },
  epu: {
    title: "EPU",
    cols: [
      "Store",
      "EPU Points target","EPU Points MTD","EPU Points MTD%","EPU Points Projection","EPU Points daily required",
      "EPU GAs target","EPU GAs MTD","EPU GAs MTD%","EPU GAs Projection",
      "EPU Box"
    ]
  },
  terminal: {
    title: "Terminal",
    cols: [
      "Store",
      "Terminal target","Terminal MTD","Terminal MTD%","Terminal daily required",
      "Terminal Projection"
    ]
  },
  home: {
    title: "AT-Home & Gated Community",
    cols: [
      "Store",
      "AT-Home target","AT-Home MTD","AT-Home MTD%","AT-Home daily required",
      "AT-Home & Gated Community Box"
    ]
  },
  adsl: {
    title: "ADSL GAs",
    cols: [
      "Store",
      "ADSL target","ADSL MTD","ADSL MTD%","ADSL daily required",
      "ADSL Projection"
    ]
  },
  overall: {
    title: "Overall",
    cols: [
      "Store",
      "CV Points Projection",
      "CV GAs Projection",
      "Consumer Box",
      "EPU Points Projection",
      "EPU Box",
      "Terminal Projection",
      "AT-Home & Gated Community Box",
      "ADSL Projection",
      "Overall","Final Commission"
    ]
  }
};

function getClass(p){
  if(p < 90) return "red";
  if(p < 100) return "yellow";
  return "green";
}

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  data = json.data;
}

function renderTable(){
  const v = document.getElementById("view").value;
  const config = views[v];
  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");
  thead.innerHTML = "";
  tbody.innerHTML = "";

  const middleCols = config.cols.slice(1, -1);
  const lastCol = config.cols[config.cols.length - 1];

  let r1 = `<tr>
    <th rowspan="2">Store</th>
    <th colspan="${middleCols.length}">${config.title}</th>
    <th rowspan="2">${lastCol}</th>
  </tr>`;
  let r2 = "<tr>";
  middleCols.forEach(c => {
    r2 += `<th>${c}</th>`;
  });
  r2 += "</tr>";
  thead.innerHTML = r1 + r2;

  data.forEach(row => {
    let tr = "<tr>";
    config.cols.forEach(c => {
      let val = row[c];
      if(percentCols.includes(c) && val !== "" && val != null){
        let pct = val * 100;
        tr += `<td class="${getClass(pct)}">${Math.round(pct)}%</td>`;
      } else {
        tr += `<td>${val ?? ""}</td>`;
      }
    });
    tr += "</tr>";
    tbody.innerHTML += tr;
  });
}

loadData();
</script>
</body>
</html>
