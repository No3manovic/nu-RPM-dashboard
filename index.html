<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; text-align:center; }
    table { margin:auto; border-collapse:collapse; background:#fff; }
    th,td { border:1px solid #999; padding:6px 10px; }
    th { background:#1a56a0; color:#fff; }
    select { padding:8px; margin-bottom:15px; }
  </style>
</head>

<body>

<h2>RPM Dashboard</h2>

<select id="view" onchange="renderTable()">
  <option value="overall">Overall</option>
  <option value="cv">Consumer Voice</option>
  <option value="epu">EPU</option>
  <option value="terminal">Terminal</option>
  <option value="home">AT-Home</option>
  <option value="adsl">ADSL</option>
</select>

<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";

let data = [];

const views = {
  overall: ["store","target","mtd","mtd_pct"],
  cv: ["store","target","mtd"],
  epu: ["store","target","mtd"],
  terminal: ["store","target"],
  home: ["store","target"],
  adsl: ["store","target"]
};

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  data = json.data;
  renderTable();
}

function renderTable(){
  const view = document.getElementById("view").value;
  const cols = views[view];

  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  let headerRow = "<tr>";
  cols.forEach(c => headerRow += `<th>${c}</th>`);
  headerRow += "</tr>";
  thead.innerHTML = headerRow;

  data.forEach(item => {
    let row = "<tr>";

    cols.forEach(c => {
      let val = item[c] || "";

      if(c === "mtd_pct"){
        val = Math.round(val * 100) + "%";
      }

      row += `<td>${val}</td>`;
    });

    row += "</tr>";
    tbody.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
