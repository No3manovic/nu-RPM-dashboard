<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; text-align:center; }

    h2 { color:#1a56a0; }

    .controls { margin-bottom:15px; }

    select, button {
      padding:8px 12px;
      font-size:14px;
      margin:5px;
    }

    button {
      background:#1a56a0;
      color:#fff;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    table {
      margin:auto;
      border-collapse:collapse;
      background:#fff;
      width:90%;
    }

    th,td {
      border:1px solid #999;
      padding:6px 10px;
      text-align:center;
    }

    th {
      background:#1a56a0;
      color:#fff;
    }

    .red { background:#ff4d4d; color:#fff; }
    .yellow { background:#ffd633; }
    .green { background:#00b050; color:#fff; }
  </style>
</head>

<body>

<h2>RPM Dashboard</h2>

<div class="controls">
  <select id="view">
    <option value="overall">Overall</option>
    <option value="cv">Consumer Voice</option>
    <option value="epu">EPU</option>
    <option value="terminal">Terminal</option>
    <option value="adsl">ADSL</option>
  </select>

  <button onclick="renderTable()">Show</button>
</div>

<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";

let data = [];

const views = {
  overall: [
    "Store",
    "Points target","Points MTD","Points MTD%",
    "GAs target","GAs MTD","GAs MTD%",
    "Terminal target","Terminal MTD","Terminal MTD%",
    "ADSL target","ADSL MTD","ADSL MTD%"
  ],

  cv: [
    "Store",
    "Points target","Points MTD","Points MTD%","Points Projection","Points daily required"
  ],

  epu: [
    "Store",
    "GAs target","GAs MTD","GAs MTD%","GAs Projection","GAs daily required"
  ],

  terminal: [
    "Store",
    "Terminal target","Terminal MTD","Terminal MTD%","Terminal daily required"
  ],

  adsl: [
    "Store",
    "ADSL target","ADSL MTD","ADSL MTD%","ADSL daily required"
  ]
};

function getClass(pct){
  if(pct < 90) return "red";
  if(pct < 100) return "yellow";
  return "green";
}

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  data = json.data;
  renderTable();
}

function renderTable(){
  const view = document.getElementById("view").value;
  const cols = views[view];

  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  let headerRow = "<tr>";
  cols.forEach(c => headerRow += `<th>${c}</th>`);
  headerRow += "</tr>";
  thead.innerHTML = headerRow;

  data.forEach(item => {
    let row = "<tr>";

    cols.forEach(c => {
      let val = item[c] ?? "";

      if(c.includes("%") && val !== ""){
        let pct = val * 100;
        row += `<td class="${getClass(pct)}">${Math.round(pct)}%</td>`;
      } else {
        row += `<td>${val}</td>`;
      }
    });

    row += "</tr>";
    tbody.innerHTML += row;
  });
}

loadData();
</script>

</body>
</html>
