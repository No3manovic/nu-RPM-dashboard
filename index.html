<!DOCTYPE html>
<html>
<head>
  <title>RPM Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:20px; text-align:center; }
    h2 { color:#1a56a0; }

    .controls { margin-bottom:15px; }

    select, button {
      padding:8px 12px;
      font-size:14px;
      margin:5px;
    }

    button {
      background:#1a56a0;
      color:#fff;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    table {
      margin:auto;
      border-collapse:collapse;
      background:#fff;
      width:95%;
    }

    th,td {
      border:1px solid #999;
      padding:6px;
      text-align:center;
    }

    th { background:#1a56a0; color:#fff; }

    .red { background:#ff4d4d; color:#fff; }
    .yellow { background:#ffd633; }
    .green { background:#00b050; color:#fff; }
  </style>
</head>

<body>

<h2>RPM Dashboard</h2>

<div class="controls">
  <select id="view">
    <option value="cv">Consumer Voice</option>
  </select>

  <button onclick="renderTable()">Show</button>
</div>

<table id="table">
  <thead></thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMkUxhW4ZUjVDcp8CB_X9fSQtaOxaFHcdI7A-YcwRhmEqGWBux8WyGZc9CgCtZmOXB/exec";

let data = [];

const viewConfig = {
  cv: {
    groups: [
      {
        name: "Store",
        cols: ["Store"]
      },
      {
        name: "Consumer voice",
        cols: [
          "Points target","Points MTD","Points MTD%","Points Projection","Points daily required",
          "GAs target","GAs MTD","GAs MTD%","GAs Projection","GAs daily required"
        ]
      },
      {
        name: "Consumer Box",
        cols: ["Consumer Box"]
      }
    ]
  }
};

function getClass(pct){
  if(pct < 90) return "red";
  if(pct < 100) return "yellow";
  return "green";
}

async function loadData(){
  const res = await fetch(API_URL);
  const json = await res.json();
  data = json.data;
}

function renderHeader(groups){
  const thead = document.querySelector("#table thead");
  thead.innerHTML = "";

  let row1 = "<tr>";
  let row2 = "<tr>";

  groups.forEach(g => {
    row1 += `<th colspan="${g.cols.length}">${g.name}</th>`;

    g.cols.forEach(c => {
      row2 += `<th>${c}</th>`;
    });
  });

  row1 += "</tr>";
  row2 += "</tr>";

  thead.innerHTML = row1 + row2;
}

function renderBody(groups){
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(item => {
    let row = "<tr>";

    groups.forEach(g => {
      g.cols.forEach(c => {
        let val = item[c] ?? "";

        if(c.includes("%") && val !== ""){
          let pct = val * 100;
          row += `<td class="${getClass(pct)}">${Math.round(pct)}%</td>`;
        } else {
          row += `<td>${val}</td>`;
        }
      });
    });

    row += "</tr>";
    tbody.innerHTML += row;
  });
}

function renderTable(){
  const view = document.getElementById("view").value;
  const config = viewConfig[view];

  renderHeader(config.groups);
  renderBody(config.groups);
}

loadData();
</script>

</body>
</html>
